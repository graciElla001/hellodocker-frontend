name: Frontend Docker Build

on:
  push:
    branches:
      - main   # or master (match your repo)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run test
      run: echo "Frontend test passed"

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Get commit SHA
      id: vars
      run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/hellodocker-frontend:latest .
        docker build -t ${{ secrets.DOCKER_USERNAME }}/hellodocker-frontend:${{ steps.vars.outputs.SHA }} .

    - name: Push Docker images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/hellodocker-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/hellodocker-frontend:${{ steps.vars.outputs.SHA }}
